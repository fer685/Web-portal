<!DOCTYPE html>
<html>
<body style="margin:0;background:#1a1a1a;font-family:sans-serif;height:100vh;display:flex;flex-direction:column">
  <div style="padding:10px;display:flex;gap:5px;background:#252525">
    <input id="u" placeholder="url..." style="flex:1;padding:10px;border-radius:5px;border:none">
    <button onclick="go()" style="padding:10px;background:#ff4a4a;color:#fff;border:none;border-radius:5px">IR</button>
  </div>
  <iframe id="f" style="flex:1;border:none;background:#fff"></iframe>
  <script>
    function go(){
      let v=document.getElementById('u').value;
      if(!v.startsWith('http')) v='https://'+v;
      // Usando un espejo de Rammerhead estable
      document.getElementById('f').src="https://rhenode1.onrender.com/main/"+v;
    }
    document.getElementById('u').onkeypress=e=>e.key==='Enter'&&go();
  </script>
</body>
</html>
